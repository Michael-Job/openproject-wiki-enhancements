# OpenProject – Custom CSS/JS injection via Apache mod_substitute
# Place this file in a location NOT managed by OpenProject's installer.
#
# For package installations (DEB/RPM), use the upgrade-safe custom include:
#   /etc/openproject/addons/apache2/custom/vhost/op-custom.conf
# This directory is NOT overwritten by `openproject configure`.
#
# Required Apache modules: mod_substitute, mod_filter, mod_headers
#   sudo a2enmod substitute filter headers
#
# Replace /op-custom with your own asset path and
# op.chronovision.de with your actual OpenProject domain.
#
# IMPORTANT: RequestHeader unset Accept-Encoding is mandatory.
# Without it, the backend delivers gzip-compressed HTML and
# mod_substitute cannot find </head> or </body> — injection silently fails.
#
# IMPORTANT: ProxyPass /op-custom ! must come BEFORE the catch-all
# ProxyPass / ... directive, otherwise Apache forwards the static
# asset requests to the OpenProject backend, resulting in 404 errors.

# Serve static assets directly, bypassing the OpenProject backend proxy
ProxyPass /op-custom !
Alias /op-custom /opt/op-custom
<Directory /opt/op-custom>
    Require all granted
</Directory>

# Inject CSS and JS into every HTML response
<Location />
    # Force uncompressed HTML so mod_substitute can parse it
    RequestHeader unset Accept-Encoding
    AddOutputFilterByType SUBSTITUTE text/html
    Substitute "s|</head>|<link rel='stylesheet' href='/op-custom/op-custom.css'></head>|n"
    Substitute "s|</body>|<script src='/op-custom/op-wiki-collapse.js'></script></body>|n"
</Location>
